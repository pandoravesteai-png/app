<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6A00F4">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pandora AI">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/G2DYHjrv/P-(1).png">
    <link rel="apple-touch-startup-image" href="https://i.postimg.cc/G2DYHjrv/P-(1).png">

    <!-- SEO -->
    <meta name="description" content="Experimente roupas virtualmente com Inteligência Artificial">

    <title>PANDORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">

    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
      }
    }
    </script>

    <style>
      /* Comportamento nativo — sem bounce, sem seleção de texto */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      /* Splash screen nativa enquanto o app carrega */
      #splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #6A00F4, #EC4899);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash img {
        width: 100px;
        height: 100px;
        border-radius: 24px;
        margin-bottom: 20px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash p {
        color: white;
        font-family: Inter, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
    </style>
  </head>
  <body>
    <!-- Splash nativa enquanto React carrega -->
    <div id="splash">
      <img src="https://i.postimg.cc/G2DYHjrv/P-(1).png" alt="Pandora AI" />
      <p>✨ Pandora AI</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <script>
      // Remove splash quando o app estiver pronto
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }
        }, 800);
      });

      // Registra Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW erro:', err));
        });
      }

      // Previne zoom duplo toque no iOS
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });

      // Previne pull-to-refresh no Android
      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
    </script>
  </body>
</html>
